version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: bazaario_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Chahelbat18!
      MYSQL_DATABASE: bazaario
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./backend/bazaario
      dockerfile: Dockerfile
    container_name: bazaario_backend
    restart: always
    depends_on:
      - db
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/bazaario?useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=Chahelbat18!
      - APP_JWT_SECRET=supersecretkey1234567890supersecretkey1234567890

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bazaario_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  mysql_data:
